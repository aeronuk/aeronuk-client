<!-- Header -->
<header class="sticky top-0 z-50 border-b border-[#E4E9F2] bg-white/90 backdrop-blur-md">
  <div class="mx-auto flex h-16 max-w-[1180px] items-center justify-between px-6">
    <a routerLink="/flights" class="flex items-center gap-2">
      <img src="assets/logo.svg" class="h-[38px] w-[38px]" alt="AeroNUK logo">
      <span class="text-[15px] font-bold tracking-[-0.01em] text-[#0B1E3D]">Aero<span class="text-[#2180E0]">NUK</span></span>
    </a>
    <nav class="flex items-center gap-6">
      <a routerLink="/flights" routerLinkActive="text-[#0B1E3D] font-semibold" class="text-[14px] text-[#5C6B84] transition-colors hover:text-[#0B1E3D]">Book</a>
      <a routerLink="/my-trips" routerLinkActive="text-[#0B1E3D] font-semibold" class="text-[14px] text-[#5C6B84] transition-colors hover:text-[#0B1E3D]">My trips</a>
    </nav>
  </div>
</header>

@if (showStepper()) {
  <app-booking-stepper />
}

<main>
  <router-outlet />
</main>

<footer class="mt-16 border-t border-[#E4E9F2] bg-white py-6">
  <div class="mx-auto flex max-w-[1180px] items-center justify-between px-6">
    <div class="flex items-center gap-2">
      <img src="assets/logo.svg" class="h-[32px] w-[32px]" alt="AeroNUK">
      <span class="text-[13px] text-[#8A99B3]">Fictional airline · demo booking experience</span>
    </div>
    <div class="flex gap-5">
      <a href="#" class="text-[13px] text-[#8A99B3] hover:text-[#0B1E3D]">Privacy</a>
      <a href="#" class="text-[13px] text-[#8A99B3] hover:text-[#0B1E3D]">Fare rules</a>
      <a href="#" class="text-[13px] text-[#8A99B3] hover:text-[#0B1E3D]">Contact</a>
    </div>
  </div>
</footer>
