<!-- Header -->
<header class="app-header">
  <div class="app-header-inner">
    <a routerLink="/flights" class="app-logo">
      <svg viewBox="0 0 680 680" width="38" height="38" class="app-logo-svg" aria-hidden="true">
        <circle cx="340" cy="340" r="320" fill="#0B1E3D"/>
        <circle cx="340" cy="340" r="304" fill="none" stroke="#1A3561" stroke-width="2"/>
        <path d="M 340 150 L 480 520 L 434 520 L 340 270 L 246 520 L 200 520 Z" fill="#FFFFFF"/>
        <path d="M 268 430 L 412 430 L 400 398 L 280 398 Z" fill="#0B1E3D"/>
        <path d="M 412 468 L 560 388 Q 604 368 616 366 Q 632 362 628 374 Q 624 384 606 394 L 484 462 Z" fill="#3B9EFF"/>
        <path d="M 268 468 L 120 388 Q 76 368 64 366 Q 48 362 52 374 Q 56 384 74 394 L 196 462 Z" fill="#3B9EFF"/>
      </svg>
      <span class="app-logo-text">Aero<span class="app-logo-text-accent">NUK</span></span>
    </a>
    <nav class="app-nav">
      <a routerLink="/flights" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact:true}" class="app-nav-link">Book</a>
      <a routerLink="/my-trips" routerLinkActive="active-nav" class="app-nav-link app-nav-link--muted">My trips</a>
    </nav>
  </div>
</header>

@if (showStepper()) {
  <app-booking-stepper />
}

<main>
  <router-outlet />
</main>

<footer class="app-footer">
  <div class="app-footer-inner">
    <span class="app-footer-brand">Aero<span class="app-logo-text-accent">NUK</span></span>
    <span class="app-footer-tagline">Fictional airline · demo booking experience</span>
    <div class="app-footer-links">
      <a href="#" class="app-footer-link">Privacy</a>
      <a href="#" class="app-footer-link">Fare rules</a>
      <a href="#" class="app-footer-link">Contact</a>
    </div>
  </div>
</footer>
