<div class="page">
  <div class="content">
    <h1 class="title">Find your booking</h1>
    <p class="subtitle">Enter your booking reference and last name to retrieve your trip.</p>

    <div class="card card-pad-28">
      <form [formGroup]="form" (ngSubmit)="find()">
        <div class="field-group">
          <label for="trip-bookingCode" class="field-label">Booking reference</label>
          <input
            id="trip-bookingCode"
            type="text"
            formControlName="bookingCode"
            class="field-input booking-code-input"
            placeholder="e.g. ANK-A1B2C3"
          >
        </div>
        <div class="field-group field-group--wide">
          <label for="trip-lastName" class="field-label">Last name</label>
          <input
            id="trip-lastName"
            type="text"
            formControlName="lastName"
            class="field-input"
            placeholder="e.g. Doe"
          >
        </div>

        @if (error()) {
          <div class="error-banner form-error-banner">
            {{ error() }}
          </div>
        }

        <button
          type="submit"
          [disabled]="searching() || form.invalid"
          class="btn-primary submit-btn"
          [class.submit-btn--disabled]="searching() || form.invalid"
        >{{ searching() ? 'Searching…' : 'Find my booking' }}</button>
      </form>
    </div>

    <p class="hint">
      Your booking reference was emailed to you when you completed your booking.
    </p>
  </div>
</div>
