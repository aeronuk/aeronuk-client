<div class="mx-auto max-w-[1180px] px-6 py-12">
  <div class="mx-auto max-w-[520px]">
    <h1 class="mb-2 text-[32px] font-extrabold tracking-[-0.02em] text-[#0B1E3D]">Find your booking</h1>
    <p class="mb-8 text-[15px] text-[#5C6B84]">Enter your booking reference and last name to retrieve your trip.</p>

    <div class="rounded-[16px] bg-white p-8" style="box-shadow: 0 1px 2px rgba(11,30,61,.04), 0 12px 28px rgba(11,30,61,.06);">
      <form [formGroup]="form" (ngSubmit)="find()" class="space-y-5">
        <div>
          <label class="mb-1.5 block text-[13px] font-semibold text-[#5C6B84]">Booking reference</label>
          <input
            type="text"
            formControlName="bookingCode"
            placeholder="e.g. AB12CD"
            class="w-full rounded-[12px] border border-[#E4E9F2] px-[14px] py-[13px] text-[15px] font-semibold uppercase tracking-widest text-[#0B1E3D] outline-none transition focus:border-[#2180E0] focus:ring-2 focus:ring-[#2180E0]/20"
          />
        </div>
        <div>
          <label class="mb-1.5 block text-[13px] font-semibold text-[#5C6B84]">Last name</label>
          <input
            type="text"
            formControlName="lastName"
            placeholder="As on your ticket"
            class="w-full rounded-[12px] border border-[#E4E9F2] px-[14px] py-[13px] text-[15px] text-[#0B1E3D] outline-none transition focus:border-[#2180E0] focus:ring-2 focus:ring-[#2180E0]/20"
          />
        </div>

        @if (error()) {
          <div class="rounded-[10px] border border-red-200 bg-red-50 px-4 py-3 text-[14px] text-red-700">
            {{ error() }}
          </div>
        }

        <button
          type="submit"
          [disabled]="form.invalid || searching()"
          class="w-full rounded-[12px] py-[15px] text-[16px] font-bold text-white transition-opacity disabled:opacity-60"
          style="background: linear-gradient(150deg, #2180E0 0%, #3B9EFF 100%); box-shadow: 0 8px 20px rgba(33,128,224,.32);"
        >
          @if (searching()) { Searching… } @else { Find booking }
        </button>
      </form>
    </div>
  </div>
</div>
