<div hlmCard>
  <div hlmCardHeader>
    <h2 hlmCardTitle class="text-xl font-semibold">Payment</h2>
    <p hlmCardDescription>Choose a payment method and enter your details</p>
  </div>
  <div hlmCardContent class="pt-2 space-y-4">

    <div class="flex flex-col gap-1.5">
      <label hlmLabel>Payment Method</label>
      <select [formControl]="methodControl" class="flex h-8 w-full rounded-lg border border-input bg-transparent px-2.5 py-1 text-sm outline-none transition-colors focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 disabled:cursor-not-allowed disabled:opacity-50">
        @for (method of methods; track method) {
          <option [value]="method">{{ method }}</option>
        }
      </select>
    </div>

    <form [formGroup]="detailsForm" (ngSubmit)="submit()" class="space-y-4">
      @switch (methodControl.value) {
        @case ('CREDIT_CARD') {
          <div class="flex flex-col gap-1.5">
            <label hlmLabel>Card Number</label>
            <input hlmInput type="text" formControlName="cardNumber" placeholder="1234 5678 9012 3456" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5">
              <label hlmLabel>Expiry Month</label>
              <input hlmInput type="number" formControlName="expiryMonth" placeholder="MM" min="1" max="12" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label hlmLabel>Expiry Year</label>
              <input hlmInput type="number" formControlName="expiryYear" placeholder="YYYY" min="2024" />
            </div>
          </div>
        }
        @case ('PAYPAL') {
          <div class="flex flex-col gap-1.5">
            <label hlmLabel>PayPal Email</label>
            <input hlmInput type="email" formControlName="email" placeholder="paypal@example.com" />
          </div>
        }
        @case ('APPLE_PAY') {
          <div class="flex flex-col gap-1.5">
            <label hlmLabel>Token</label>
            <input hlmInput type="text" formControlName="token" placeholder="Apple Pay token" />
          </div>
        }
        @case ('PIX') {
          <div class="flex flex-col gap-1.5">
            <label hlmLabel>PIX Key</label>
            <input hlmInput type="text" formControlName="pixKey" placeholder="CPF, phone or email" />
          </div>
        }
        @case ('IDEAL') {
          <div class="flex flex-col gap-1.5">
            <label hlmLabel>Bank</label>
            <input hlmInput type="text" formControlName="bank" placeholder="Bank name" />
          </div>
        }
      }

      @if (error()) {
        <p class="text-sm text-destructive">{{ error() }}</p>
      }

      <button hlmBtn type="submit" [disabled]="detailsForm.invalid || submitting()">
        @if (submitting()) { Processing… } @else { Pay Now }
      </button>
    </form>
  </div>
</div>
