<div style="max-width:1180px; margin:0 auto; padding:40px 24px 80px;">
  <a routerLink="/flights" style="color:#2180E0; font-weight:600; font-size:14px; text-decoration:none; display:inline-block; margin-bottom:16px;">← Back to search</a>
  <h1 style="margin:0 0 8px; font-size:32px; font-weight:800; letter-spacing:-0.03em;">All destinations</h1>
  <p style="margin:0 0 28px; color:#5C6B84; font-size:16px;">Flying from London (LHR). Prices shown are return fares.</p>
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:18px;">
    @for (dest of allDestinations; track dest.code) {
      <div (click)="select(dest)" style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 1px 2px rgba(11,30,61,0.04), 0 12px 28px rgba(11,30,61,0.07); cursor:pointer;">
        <div style="height:150px; background-image:repeating-linear-gradient(135deg,#DCE5F1 0 12px,#E7EEF7 12px 24px); display:flex; align-items:flex-end; padding:12px;">
          <span style="background:rgba(11,30,61,0.72); color:#fff; font-size:11px; font-family:ui-monospace,monospace; padding:4px 8px; border-radius:6px;">{{ dest.imageLabel }}</span>
        </div>
        <div style="padding:16px;">
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <div style="font-size:18px; font-weight:700;">{{ dest.city }}</div>
            <div style="font-size:12px; font-weight:600; color:#8A99B3; font-family:ui-monospace,monospace;">{{ dest.code }}</div>
          </div>
          <div style="margin-top:8px; color:#5C6B84; font-size:14px;">Return from <span style="color:#0B1E3D; font-weight:700;">{{ dest.price }}</span></div>
        </div>
      </div>
    }
  </div>
</div>
