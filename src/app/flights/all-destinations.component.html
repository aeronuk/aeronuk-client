<div class="page">
  <a routerLink="/flights" class="back-link">← Back to search</a>
  <h1 class="page-title">All destinations</h1>
  <p class="page-subtitle">Flying from London (LHR). Prices shown are return fares.</p>
  <div class="destination-grid">
    @for (dest of allDestinations; track dest.code) {
      <div
        (click)="select(dest)"
        (keydown.enter)="select(dest)"
        role="button"
        tabindex="0"
        class="destination-card"
      >
        <div class="destination-card-image">
          <span class="destination-card-image-label">{{ dest.imageLabel }}</span>
        </div>
        <div class="destination-card-body">
          <div class="destination-card-row">
            <div class="destination-card-city">{{ dest.city }}</div>
            <div class="destination-card-code">{{ dest.code }}</div>
          </div>
          <div class="destination-card-price">Return from <span class="destination-card-price-value">{{ dest.price }}</span></div>
        </div>
      </div>
    }
  </div>
</div>
