<div class="stepper-bar">
  <div class="stepper-bar-inner">
    @for (step of steps(); track step.label; let last = $last; let i = $index) {
      <div
        (click)="navigate(step)"
        (keydown.enter)="navigate(step)"
        role="button"
        [attr.tabindex]="step.done ? 0 : -1"
        class="stepper-step"
        [class.stepper-step--clickable]="step.done"
      >
        <div
          class="stepper-dot"
          [class.stepper-dot--done]="step.done"
          [class.stepper-dot--active]="!step.done && step.active"
        >{{ step.done ? '✓' : (i + 1) }}</div>
        <span
          class="stepper-label"
          [class.stepper-label--done]="step.done"
          [class.stepper-label--active]="!step.done && step.active"
        >{{ step.label }}</span>
        @if (!last) {
          <div class="stepper-connector"></div>
        }
      </div>
    }
  </div>
</div>
